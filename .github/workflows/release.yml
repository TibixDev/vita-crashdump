name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: vita-crashdump-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: vita-crashdump-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: vita-crashdump-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-dev libwayland-dev

      - name: Build CLI
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo build --release --features gui --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/vita-crashdump ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/vita-crashdump-gui ${{ matrix.artifact }}/
          tar czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir ${{ matrix.artifact }}
          cp target/${{ matrix.target }}/release/vita-crashdump.exe ${{ matrix.artifact }}/
          cp target/${{ matrix.target }}/release/vita-crashdump-gui.exe ${{ matrix.artifact }}/
          Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
